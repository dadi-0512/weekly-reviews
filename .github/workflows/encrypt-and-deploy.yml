name: Encrypt and Deploy
 
on:
  push:
    branches: [main]
    paths:
      - '*.html'
 
jobs:
  encrypt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install staticrypt
        run: npm install -g staticrypt
 
      - name: Encrypt HTML files
        run: |
          mkdir -p encrypted
          for f in *.html; do
            [ -f "$f" ] || continue
            staticrypt "$f" --password "${{ secrets.STATICRYPT_PASSWORD }}" --short --output "encrypted/$f"
            echo "Encrypted: $f → encrypted/$f"
          done
 
      - name: Commit encrypted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add encrypted/
          git diff --staged --quiet || git commit -m "Auto-encrypt: $(date +%Y-%m-%d)"
          git push
